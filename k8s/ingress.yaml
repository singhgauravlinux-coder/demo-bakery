# Traefik ingress for the bakery stack.
#
# Prereq: Traefik installed as ingress controller with the Kubernetes CRD
# provider enabled (the default when installed via Helm):
#   helm repo add traefik https://traefik.github.io/charts
#   helm install traefik traefik/traefik -n traefik --create-namespace
#
# Standard networking.k8s.io Ingress objects are used (Traefik watches them
# natively), plus one Traefik Middleware CRD to cap request body size at 5m
# (mirrors the old nginx proxy-body-size annotation).
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: body-limit
  namespace: bakery
spec:
  buffering:
    maxRequestBodyBytes: 5242880   # 5 MiB
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bakery-ingress
  namespace: bakery
  annotations:
    # <namespace>-<middleware>@kubernetescrd
    traefik.ingress.kubernetes.io/router.middlewares: bakery-body-limit@kubernetescrd
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: bakery.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 8080
---
# DB frontend (Adminer). Keep this host off public DNS, protect it with a
# Traefik basicAuth middleware, or delete this Ingress and use
# `kubectl port-forward svc/adminer 8081:8080` instead.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bakery-db-ingress
  namespace: bakery
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: db.bakery.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: adminer
                port:
                  number: 8080
