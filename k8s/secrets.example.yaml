# Copy to k8s/secrets.yaml (git-ignored), fill in real values, then:
#   kubectl apply -f k8s/secrets.yaml
#
# Get the key pair from https://dashboard.razorpay.com -> Settings -> API Keys.
# Set the webhook secret in Settings -> Webhooks (point the webhook at
# https://<your-host>/api/payments/razorpay/webhook).
apiVersion: v1
kind: Secret
metadata:
  name: razorpay-credentials
  namespace: bakery
type: Opaque
stringData:
  keyId: rzp_test_XXXXXXXXXXXXXX
  keySecret: CHANGE_ME
  webhookSecret: CHANGE_ME
