apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: bakery
  labels:
    app: analytics-service
    app.kubernetes.io/part-of: crumb-and-ember
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: analytics-service
          image: ghcr.io/singhgauravlinux-coder/demo-bakery/analytics-service:4e7ca01
          imagePullPolicy: Always
          ports:
            - containerPort: 3019
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: SERVICE_NAME
              value: "analytics-service"
            - name: PORT
              value: "3019"
            - name: LOG_LEVEL
              value: "info"
          readinessProbe:
            httpGet:
              path: /ready
              port: 3019
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3019
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: bakery
  labels:
    app: analytics-service
spec:
  selector:
    app: analytics-service
  ports:
    - port: 3019
      targetPort: 3019
      protocol: TCP
