apiVersion: apps/v1
kind: Deployment
metadata:
  name: baking-schedule-service
  namespace: bakery
  labels:
    app: baking-schedule-service
    app.kubernetes.io/part-of: crumb-and-ember
spec:
  replicas: 1
  selector:
    matchLabels:
      app: baking-schedule-service
  template:
    metadata:
      labels:
        app: baking-schedule-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: baking-schedule-service
          image: ghcr.io/singhgauravlinux-coder/demo-bakery/baking-schedule-service:4e7ca01
          imagePullPolicy: Always
          ports:
            - containerPort: 3017
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: SERVICE_NAME
              value: "baking-schedule-service"
            - name: PORT
              value: "3017"
            - name: LOG_LEVEL
              value: "info"
          readinessProbe:
            httpGet:
              path: /ready
              port: 3017
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3017
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: baking-schedule-service
  namespace: bakery
  labels:
    app: baking-schedule-service
spec:
  selector:
    app: baking-schedule-service
  ports:
    - port: 3017
      targetPort: 3017
      protocol: TCP
